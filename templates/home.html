<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Recommendation</title>
    <link rel="preload" as="image" href="/static/pencil_yellow.jpg">
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
</head>
<body>
  <div class="page">
    <aside class="form-container">
      <form class="user_form" action="/" method="POST">
        <h3>Welcome !</h3>

        <input type="text" name="username" placeholder="Your name" required>
        <input type="email" name="email" placeholder="Your email" required>

        <button type="submit">Continue</button>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
      </form>
    </aside>

    <section class="right-panel">
      <div class="hero-box">
        <h1>Welcome to<br>Event Recommendation System</h1>
        <p>
          Discover events tailored to your interests — college activities,
          workshops, hackathons, seminars and more.
        </p>
      </div>
    </section>

  </div>
</body>


</html>
